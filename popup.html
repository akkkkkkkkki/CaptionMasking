<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 250px; padding: 15px; font-family: sans-serif; }
    button { width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    #word-list { max-height: 300px; overflow-y: auto; border-top: 1px solid #ddd; padding-top: 10px; font-size: 14px; word-wrap: break-word; }
  </style>
</head>
<body>
  <h3>🎧 听力预习模式</h3>
  <button id="btn-toggle" style="background: #28a745;">拦截器: <span id="status">关闭</span></button>
  <button id="btn-scan">生成全篇生词表</button>
  <button id="btn-mask">开启/关闭黑胶带遮罩</button>
  <div id="word-list">
    <strong>使用说明：</strong><br>
    1. 先打开拦截器<br>
    2. 开启视频字幕 [CC]<br>
    3. 生成生词表<br>
    4. 关闭拦截器恢复正常播放
  </div>
  <script src="popup.js"></script>
</body>
</html>
